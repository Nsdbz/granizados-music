<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Benditos Granizados 🧊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --black:   #080c14;
      --neon:    #00CFFF;
      --neon2:   #00F0FF;
      --surface: #0d1624;
      --card:    #0f1e30;
      --border:  rgba(0,207,255,0.18);
      --text:    #e8f8ff;
      --muted:   #4a7a90;
      --pink:    #FF2D9B;
      --yellow:  #FFE600;
      --ig:      #E1306C;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: 'Nunito', sans-serif;
      background: var(--black);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 70% 40% at 0% 0%, rgba(0,207,255,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 100% 100%, rgba(0,207,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ─── HEADER ─── */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(8,12,20,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0,207,255,0.2);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,207,255,0.5), transparent);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-text { line-height: 1.15; }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.35rem;
      letter-spacing: .06em;
      color: var(--neon);
      text-shadow: 0 0 14px rgba(0,207,255,0.6);
    }

    .brand-sub {
      font-size: .67rem;
      font-weight: 700;
      color: rgba(0,207,255,0.6);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    /* ─── BOTÓN INSTAGRAM ─── */
    .ig-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(225,48,108,0.12);
      border: 1px solid rgba(225,48,108,0.35);
      border-radius: 999px;
      padding: 7px 13px;
      color: #ff6ea3;
      text-decoration: none;
      font-family: 'Nunito', sans-serif;
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: .04em;
      transition: background .2s, border-color .2s, box-shadow .2s;
      flex-shrink: 0;
    }

    .ig-btn:active {
      background: rgba(225,48,108,0.25);
      border-color: rgba(225,48,108,0.7);
      box-shadow: 0 0 14px rgba(225,48,108,0.35);
    }

    .ig-btn svg {
      flex-shrink: 0;
    }

    /* ─── MAIN ─── */
    .main {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 40px;
    }

    .view { display: none; }
    .view.active { display: block; }

    /* ─── HERO ─── */
    .hero {
      text-align: center;
      padding: 28px 20px 16px;
    }

    .hero-title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .hero-logo {
      width: 70px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 14px rgba(0,207,255,0.55));
      flex-shrink: 0;
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: .08em;
      line-height: 1;
      color: var(--text);
    }

    .hero-title span {
      color: var(--neon);
      text-shadow: 0 0 16px rgba(0,207,255,0.5);
      display: block;
    }

    .hero-sub {
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ─── PLAYLISTS ─── */
    .section-label {
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(0,207,255,0.5);
      padding: 0 16px;
      margin-bottom: 10px;
    }

    .playlists-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 14px;
    }

    .playlist-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: transform .15s, border-color .15s, box-shadow .15s;
      position: relative;
      overflow: hidden;
    }

    .playlist-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--neon), var(--neon2));
      box-shadow: 0 0 8px var(--neon);
    }

    .playlist-card:active {
      transform: scale(.97);
      border-color: rgba(0,207,255,0.5);
      box-shadow: 0 0 20px rgba(0,207,255,0.2);
    }

    .pl-emoji {
      width: 50px;
      height: 50px;
      background: rgba(0,207,255,0.1);
      border: 1px solid rgba(0,207,255,0.25);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(0,207,255,0.15);
    }

    .pl-cover {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid rgba(0,207,255,0.25);
      box-shadow: 0 0 12px rgba(0,207,255,0.15);
    }

    .pl-info { flex: 1; min-width: 0; }

    .pl-name {
      font-size: 1rem;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .pl-meta {
      font-size: .75rem;
      font-weight: 600;
      color: var(--muted);
      margin-top: 3px;
    }

    .pl-arrow {
      font-size: 1.3rem;
      color: var(--neon);
      text-shadow: 0 0 8px var(--neon);
      flex-shrink: 0;
    }

    /* ─── SONGS HEADER ─── */
    .songs-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .search-wrap {
      position: sticky;
      top: 65px;
      z-index: 30;
      background: var(--black);
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 14px;
      background: var(--surface);
      border: 1px solid rgba(0,207,255,0.25);
      border-radius: 12px;
      padding: 10px 14px;
      box-shadow: 0 0 14px rgba(0,207,255,0.08);
    }

    .search-wrap svg { color: rgba(0,207,255,0.4); flex-shrink: 0; }

    .search-wrap input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: .88rem;
      font-weight: 600;
    }

    .search-wrap input::placeholder { color: var(--muted); }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(0,207,255,0.1);
      border: 1px solid rgba(0,207,255,0.25);
      color: var(--neon);
      border-radius: 10px;
      padding: 7px 12px;
      font-family: 'Nunito', sans-serif;
      font-size: .8rem;
      font-weight: 700;
      cursor: pointer;
    }

    .songs-pl-name {
      font-size: .95rem;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    /* ─── SONGS LIST ─── */
    .songs-list {
      padding: 0 14px 100px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .song-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color .12s, box-shadow .12s;
    }

    .song-item:active {
      border-color: rgba(0,207,255,0.5);
      box-shadow: 0 0 14px rgba(0,207,255,0.15);
    }

    .s-thumb {
      width: 56px;
      height: 42px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .s-thumb-ph {
      background: rgba(0,207,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(0,207,255,0.3);
      font-size: .9rem;
    }

    .s-info { flex: 1; min-width: 0; }

    .s-title {
      font-size: .85rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .s-add {
      font-size: 1.4rem;
      color: var(--neon);
      text-shadow: 0 0 8px var(--neon);
      font-weight: 300;
      flex-shrink: 0;
    }

    /* ─── MODAL ─── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--surface);
      border: 1px solid rgba(0,207,255,0.3);
      border-radius: 22px 22px 0 0;
      padding: 20px 18px 36px;
      width: 100%;
      max-width: 480px;
      animation: slideUp .25s ease;
      box-shadow: 0 -8px 40px rgba(0,207,255,0.15);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: rgba(0,207,255,0.3);
      border-radius: 999px;
      margin: 0 auto 16px;
    }

    .modal-thumb {
      width: 120px;
      height: 90px;
      border-radius: 12px;
      object-fit: cover;
      display: block;
      margin: 0 auto 14px;
      border: 1px solid rgba(0,207,255,0.2);
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 800;
      text-align: center;
      color: var(--text);
      margin-bottom: 5px;
      line-height: 1.3;
    }

    .modal-sub {
      font-size: .82rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 20px;
    }

    .modal-actions { display: flex; gap: 10px; }

    .btn-cancel {
      flex: 1;
      background: rgba(0,207,255,0.06);
      border: 1px solid rgba(0,207,255,0.15);
      color: var(--muted);
      border-radius: 12px;
      padding: 13px;
      font-family: 'Nunito', sans-serif;
      font-size: .88rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-confirm {
      flex: 2;
      background: var(--neon);
      border: none;
      color: #050c18;
      border-radius: 12px;
      padding: 13px;
      font-family: 'Nunito', sans-serif;
      font-size: .9rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0,207,255,0.5);
    }

    .btn-confirm:disabled { opacity: .5; cursor: not-allowed; }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface);
      border: 1px solid rgba(242, 255, 0, 0.35);
      color: var(--text);
      padding: 12px 22px;
      border-radius: 999px;
      font-size: .84rem;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 200;
      white-space: nowrap;
      max-width: 88vw;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: 0 4px 24px rgba(0,207,255,0.2);
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: var(--pink); box-shadow: 0 4px 24px rgba(255,45,155,0.3); }

    /* ─── HELPERS ─── */
    .empty-msg {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: .88rem;
      font-weight: 600;
    }

    .loading-msg {
      text-align: center;
      padding: 40px 20px;
      color: rgba(0,207,255,0.5);
      font-size: .88rem;
      font-weight: 600;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

    .deco-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 10px 0 20px;
    }

    .deco-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--neon);
      opacity: .25;
      box-shadow: 0 0 6px var(--neon);
    }
  </style>
</head>
<body>

  <!-- MODAL -->

  <div class="toast" id="toast"></div>

  <script>
    // ─── ESTADO ───────────────────────────────────────────────────────────────
    let allSongs = []
    let selectedSong = null
    let allPlaylistsCache = []
    let allSongsGlobal = null

    function getClientId() {
      let id = localStorage.getItem('granizados_client_id')
      if (!id) { id = crypto.randomUUID(); localStorage.setItem('granizados_client_id', id) }
      return id
    }

    // ─── MOTOR DE BÚSQUEDA ────────────────────────────────────────────────────

    // Normaliza: minúsculas, sin acentos, sin caracteres raros
    function norm(str) {
      return (str || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')   // quita diacríticos (á→a, ñ→n, etc.)
        .replace(/[^a-z0-9\s]/g, ' ')       // símbolos → espacio
        .replace(/\s+/g, ' ')
        .trim()
    }

    // Distancia de Levenshtein (para typos)
    function levenshtein(a, b) {
      if (a === b) return 0
      if (a.length === 0) return b.length
      if (b.length === 0) return a.length
      const dp = Array.from({ length: a.length + 1 }, (_, i) => [i])
      for (let j = 1; j <= b.length; j++) dp[0][j] = j
      for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
          dp[i][j] = a[i-1] === b[j-1]
            ? dp[i-1][j-1]
            : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1])
        }
      }
      return dp[a.length][b.length]
    }

    // ¿Una palabra del título es "cercana" a la palabra buscada? (tolera 1 typo en palabras largas)
    function fuzzyWordMatch(titleWord, queryWord) {
      if (titleWord === queryWord) return true
      if (titleWord.startsWith(queryWord)) return true
      const maxDist = queryWord.length >= 5 ? 1 : 0   // solo typos en palabras de 5+ letras
      return levenshtein(titleWord, queryWord) <= maxDist
    }

    // Motor principal: devuelve score numérico (< 0 = excluir)
    function scoreMatch(title, queryWords) {
      const normTitle = norm(title)
      const titleWords = normTitle.split(' ')
      const fullQuery  = queryWords.join(' ')

      // — Cada palabra de la query debe tener al menos coincidencia fuzzy en alguna palabra del título
      for (const qw of queryWords) {
        const hasMatch = titleWords.some(tw => fuzzyWordMatch(tw, qw))
        if (!hasMatch) return -1
      }

      let score = 0

      // Nivel 1 — coincidencia exacta de la frase completa (máximo bonus)
      if (normTitle === fullQuery)                          score += 200
      else if (normTitle.startsWith(fullQuery + ' '))       score += 150
      else if (normTitle.includes(fullQuery))               score += 100

      // Nivel 2 — cada palabra de la query analizada individualmente
      for (const qw of queryWords) {
        for (const tw of titleWords) {
          if (tw === qw)                  { score += 40; break }  // palabra exacta
          if (tw.startsWith(qw))          { score += 25; break }  // prefijo
          if (tw.includes(qw))            { score += 15; break }  // substring
          if (fuzzyWordMatch(tw, qw))     { score +=  8; break }  // fuzzy (typo)
        }
      }

      // Nivel 3 — boost si el título empieza con la query
      if (normTitle.startsWith(queryWords[0]))              score += 20

      // Nivel 4 — penalizar títulos muy largos (menos relevantes si la query es corta)
      score -= Math.floor(titleWords.length / 6)

      return score
    }

    // Punto de entrada: recibe array de songs, devuelve los relevantes ordenados
    function searchSongs(songs, rawQuery) {
      if (!rawQuery.trim()) return songs
      const queryWords = norm(rawQuery).split(' ').filter(Boolean)
      if (!queryWords.length) return songs

      return songs
        .map(s => ({ s, score: scoreMatch(s.title, queryWords) }))
        .filter(x => x.score >= 0)
        .sort((a, b) => b.score - a.score)
        .map(x => x.s)
    }

    // ─── CARGA DE PLAYLISTS ───────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', loadPlaylists)

    async function loadPlaylists() {
      try {
        const res = await fetch('/playlists')
        const playlists = await res.json()
        allPlaylistsCache = playlists
        const el = document.getElementById('playlistsGrid')
        const emojis = ['🎵','🔥','⚡','💜','🧊','🎶','💥','✨']
        if (!playlists.length) {
          el.innerHTML = '<p class="empty-msg">No hay playlists disponibles aún 😴</p>'
          return
        }
        el.innerHTML = playlists.map((pl, i) => `
          <div class="playlist-card" onclick="openPlaylist('${pl.id}', '${escAttr(pl.name)}')">
            ${pl.cover
              ? `<img class="pl-cover" src="${pl.cover}" alt="${escAttr(pl.name)}">`
              : `<div class="pl-emoji">${emojis[i % emojis.length]}</div>`
            }
            <div class="pl-info">
              <div class="pl-name">${pl.name}</div>
              <div class="pl-meta">${pl.total} canciones disponibles</div>
            </div>
            <div class="pl-arrow">›</div>
          </div>
        `).join('')
      } catch (e) {
        document.getElementById('playlistsGrid').innerHTML = '<p class="empty-msg">Error cargando playlists 😵</p>'
      }
    }

    // ─── CACHÉ GLOBAL DE CANCIONES ────────────────────────────────────────────

    async function loadAllSongsGlobal() {
      if (allSongsGlobal) return allSongsGlobal
      const lists = allPlaylistsCache.length ? allPlaylistsCache : await (await fetch('/playlists')).json()
      const results = await Promise.all(
        lists.map(pl => fetch(`/playlists/${pl.id}/songs`).then(r => r.json()).catch(() => []))
      )
      const merged = []
      const seen = new Set()
      results.forEach(songs => {
        songs.forEach(s => {
          if (!seen.has(s.videoId)) { seen.add(s.videoId); merged.push(s) }
        })
      })
      allSongsGlobal = merged
      return merged
    }

    // ─── BÚSQUEDA GLOBAL ──────────────────────────────────────────────────────

    let globalSearchTimer = null

    async function filterGlobalSearch() {
      const q = document.getElementById('globalSearchInput').value
      const resultsEl = document.getElementById('globalSearchResults')
      const gridEl    = document.getElementById('playlistsGrid')
      const labelEl   = document.querySelector('.section-label')
      const decoEl    = document.querySelector('.deco-dots')

      if (!q.trim()) {
        resultsEl.innerHTML = ''
        gridEl.style.display = ''
        if (labelEl) labelEl.style.display = ''
        if (decoEl)  decoEl.style.display  = ''
        return
      }

      gridEl.style.display = 'none'
      if (labelEl) labelEl.style.display = 'none'
      if (decoEl)  decoEl.style.display  = 'none'

      // Debounce: espera 180ms antes de ejecutar para no buscar en cada tecla
      clearTimeout(globalSearchTimer)
      globalSearchTimer = setTimeout(async () => {
        resultsEl.innerHTML = '<p class="loading-msg">Buscando...</p>'
        const songs   = await loadAllSongsGlobal()
        const results = searchSongs(songs, q)

        if (!results.length) {
          resultsEl.innerHTML = '<p class="empty-msg">No se encontraron canciones 🔍</p>'
          return
        }

        resultsEl.innerHTML = `
          <div class="songs-list" style="padding:0 14px 10px">
            ${results.map(s => `
              <div class="song-item" onclick="openConfirm('${s.videoId}', '${escAttr(s.title)}', '${s.thumbnail || ''}')">
                ${s.thumbnail
                  ? `<img class="s-thumb" src="${s.thumbnail}" alt="${escAttr(s.title)}">`
                  : '<div class="s-thumb s-thumb-ph">🎵</div>'
                }
                <div class="s-info"><div class="s-title">${s.title}</div></div>
                <div class="s-add">+</div>
              </div>
            `).join('')}
          </div>
        `
      }, 180)
    }

    // ─── VISTA CANCIONES ──────────────────────────────────────────────────────

    async function openPlaylist(id, name) {
      document.getElementById('songsTitle').textContent = name
      document.getElementById('searchInput').value = ''
      document.getElementById('songsList').innerHTML = '<p class="loading-msg">Cargando canciones...</p>'
      showView('viewSongs')
      try {
        const res = await fetch(`/playlists/${id}/songs`)
        allSongs = await res.json()
        renderSongs(allSongs)
      } catch (e) {
        document.getElementById('songsList').innerHTML = '<p class="empty-msg">Error cargando canciones 😵</p>'
      }
    }

    function renderSongs(songs) {
      const el = document.getElementById('songsList')
      if (!songs.length) { el.innerHTML = '<p class="empty-msg">No se encontraron canciones 🔍</p>'; return }
      el.innerHTML = songs.map(s => `
        <div class="song-item" onclick="openConfirm('${s.videoId}', '${escAttr(s.title)}', '${s.thumbnail || ''}')">
          ${s.thumbnail
            ? `<img class="s-thumb" src="${s.thumbnail}" alt="${escAttr(s.title)}">`
            : '<div class="s-thumb s-thumb-ph">🎵</div>'
          }
          <div class="s-info"><div class="s-title">${s.title}</div></div>
          <div class="s-add">+</div>
        </div>
      `).join('')
    }

    function filterSongs() {
      const q = document.getElementById('searchInput').value
      renderSongs(searchSongs(allSongs, q))
    }

    // ─── NAVEGACIÓN ───────────────────────────────────────────────────────────

    function goBack() { showView('viewPlaylists'); allSongs = [] }
    function showView(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'))
      document.getElementById(id).classList.add('active')
    }

    // ─── MODAL ────────────────────────────────────────────────────────────────

    function openConfirm(videoId, title, thumbnail) {
      selectedSong = { videoId, title, thumbnail }
      document.getElementById('confirmTitle').textContent = title
      const img = document.getElementById('confirmThumb')
      if (thumbnail) { img.src = thumbnail; img.style.display = 'block' }
      else img.style.display = 'none'
      document.getElementById('confirmModal').classList.add('open')
    }

    function closeModal() { document.getElementById('confirmModal').classList.remove('open'); selectedSong = null }
    document.addEventListener('click', e => { if (e.target === document.getElementById('confirmModal')) closeModal() })

    async function confirmRequest() {
      if (!selectedSong) return
      const btn = document.querySelector('.btn-confirm')
      btn.disabled = true; btn.textContent = 'Enviando...'
      try {
        const res = await fetch('/request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...selectedSong, clientId: getClientId() })
        })
        const data = await res.json()
        closeModal()
        showToast(data.ok ? '🔥 ¡Canción en camino!' : data.error, !data.ok)
      } catch (e) {
        showToast('Error de conexión 😵', true)
      } finally {
        btn.disabled = false; btn.textContent = '¡Sí, pónla! 🔥'
      }
    }

    // ─── UTILIDADES ───────────────────────────────────────────────────────────

    function showToast(msg, isError = false) {
      const el = document.getElementById('toast')
      el.textContent = msg
      el.className = 'toast show' + (isError ? ' error' : '')
      setTimeout(() => el.classList.remove('show'), 3000)
    }

    function escAttr(str) { return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;') }
  </script>
</body>
</html>

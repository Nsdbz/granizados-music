<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Benditos Granizados 🧊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --black:   #080c14;
      --neon:    #00CFFF;
      --neon2:   #00F0FF;
      --surface: #0d1624;
      --card:    #0f1e30;
      --border:  rgba(0,207,255,0.18);
      --text:    #e8f8ff;
      --muted:   #4a7a90;
      --pink:    #FF2D9B;
      --yellow:  #FFE600;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: 'Nunito', sans-serif;
      background: var(--black);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    /* Luz neon SOLO en los costados (izquierda y derecha) - NADA arriba ni abajo */
    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 70% 40% at 0% 0%, rgba(0,207,255,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 100% 100%, rgba(0,207,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ─── HEADER ─── */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(8,12,20,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0,207,255,0.2);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,207,255,0.5), transparent);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-wrap {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid rgba(0,207,255,0.5);
      flex-shrink: 0;
      box-shadow: 0 0 14px rgba(0,207,255,0.4);
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand-text { line-height: 1.15; }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.35rem;
      letter-spacing: .06em;
      color: var(--neon);
      text-shadow: 0 0 14px rgba(0,207,255,0.6);
    }

    .brand-sub {
      font-size: .67rem;
      font-weight: 700;
      color: rgba(0,207,255,0.6);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(0,207,255,0.1);
      border: 1px solid rgba(0,207,255,0.3);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: .68rem;
      font-weight: 800;
      color: var(--neon);
      letter-spacing: .06em;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--neon);
      box-shadow: 0 0 6px var(--neon);
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .3; transform: scale(.7); }
    }

    /* ─── MAIN ─── */
    .main {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 40px;
    }

    .view { display: none; }
    .view.active { display: block; }

    /* ─── HERO ─── */
    .hero {
      text-align: center;
      padding: 28px 20px 16px;
    }

    .hero-title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .hero-logo {
      width: 70px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 14px rgba(0,207,255,0.55));
      flex-shrink: 0;
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: .08em;
      line-height: 1;
      color: var(--text);
    }

    .hero-title span {
      color: var(--neon);
      text-shadow: 0 0 16px rgba(0,207,255,0.5);
      display: block;
    }

    .hero-sub {
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ─── PLAYLISTS ─── */
    .section-label {
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(0,207,255,0.5);
      padding: 0 16px;
      margin-bottom: 10px;
    }

    .playlists-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 14px;
    }

    .playlist-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: transform .15s, border-color .15s, box-shadow .15s;
      position: relative;
      overflow: hidden;
    }

    .playlist-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--neon), var(--neon2));
      box-shadow: 0 0 8px var(--neon);
    }

    .playlist-card:active {
      transform: scale(.97);
      border-color: rgba(0,207,255,0.5);
      box-shadow: 0 0 20px rgba(0,207,255,0.2);
    }

    .pl-emoji {
      width: 50px;
      height: 50px;
      background: rgba(0,207,255,0.1);
      border: 1px solid rgba(0,207,255,0.25);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(0,207,255,0.15);
    }

    .pl-info { flex: 1; min-width: 0; }

    .pl-name {
      font-size: 1rem;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .pl-meta {
      font-size: .75rem;
      font-weight: 600;
      color: var(--muted);
      margin-top: 3px;
    }

    .pl-arrow {
      font-size: 1.3rem;
      color: var(--neon);
      text-shadow: 0 0 8px var(--neon);
      flex-shrink: 0;
    }

    /* ─── SONGS HEADER ─── */
    .songs-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .search-wrap {
      position: sticky;
      top: 65px;
      z-index: 30;
      background: var(--black);
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 14px;
      background: var(--surface);
      border: 1px solid rgba(0,207,255,0.25);
      border-radius: 12px;
      padding: 10px 14px;
      box-shadow: 0 0 14px rgba(0,207,255,0.08);
    }

    .search-wrap svg { color: rgba(0,207,255,0.4); flex-shrink: 0; }

    .search-wrap input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: .88rem;
      font-weight: 600;
    }

    .search-wrap input::placeholder { color: var(--muted); }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(0,207,255,0.1);
      border: 1px solid rgba(0,207,255,0.25);
      color: var(--neon);
      border-radius: 10px;
      padding: 7px 12px;
      font-family: 'Nunito', sans-serif;
      font-size: .8rem;
      font-weight: 700;
      cursor: pointer;
    }

    .songs-pl-name {
      font-size: .95rem;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    /* ─── SONGS LIST ─── */
    .songs-list {
      padding: 0 14px 100px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .song-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color .12s, box-shadow .12s;
    }

    .song-item:active {
      border-color: rgba(0,207,255,0.5);
      box-shadow: 0 0 14px rgba(0,207,255,0.15);
    }

    .s-thumb {
      width: 56px;
      height: 42px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .s-thumb-ph {
      background: rgba(0,207,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(0,207,255,0.3);
      font-size: .9rem;
    }

    .s-info { flex: 1; min-width: 0; }

    .s-title {
      font-size: .85rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .s-add {
      font-size: 1.4rem;
      color: var(--neon);
      text-shadow: 0 0 8px var(--neon);
      font-weight: 300;
      flex-shrink: 0;
    }

    /* ─── MODAL ─── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--surface);
      border: 1px solid rgba(0,207,255,0.3);
      border-radius: 22px 22px 0 0;
      padding: 20px 18px 36px;
      width: 100%;
      max-width: 480px;
      animation: slideUp .25s ease;
      box-shadow: 0 -8px 40px rgba(0,207,255,0.15);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: rgba(0,207,255,0.3);
      border-radius: 999px;
      margin: 0 auto 16px;
    }

    .modal-thumb {
      width: 120px;
      height: 90px;
      border-radius: 12px;
      object-fit: cover;
      display: block;
      margin: 0 auto 14px;
      border: 1px solid rgba(0,207,255,0.2);
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 800;
      text-align: center;
      color: var(--text);
      margin-bottom: 5px;
      line-height: 1.3;
    }

    .modal-sub {
      font-size: .82rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 20px;
    }

    .modal-actions { display: flex; gap: 10px; }

    .btn-cancel {
      flex: 1;
      background: rgba(0,207,255,0.06);
      border: 1px solid rgba(0,207,255,0.15);
      color: var(--muted);
      border-radius: 12px;
      padding: 13px;
      font-family: 'Nunito', sans-serif;
      font-size: .88rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-confirm {
      flex: 2;
      background: var(--neon);
      border: none;
      color: #050c18;
      border-radius: 12px;
      padding: 13px;
      font-family: 'Nunito', sans-serif;
      font-size: .9rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0,207,255,0.5);
    }

    .btn-confirm:disabled { opacity: .5; cursor: not-allowed; }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface);
      border: 1px solid rgba(242, 255, 0, 0.35);
      color: var(--text);
      padding: 12px 22px;
      border-radius: 999px;
      font-size: .84rem;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 200;
      white-space: nowrap;
      max-width: 88vw;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: 0 4px 24px rgba(0,207,255,0.2);
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: var(--pink); box-shadow: 0 4px 24px rgba(255,45,155,0.3); }

    /* ─── HELPERS ─── */
    .empty-msg {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: .88rem;
      font-weight: 600;
    }

    .loading-msg {
      text-align: center;
      padding: 40px 20px;
      color: rgba(0,207,255,0.5);
      font-size: .88rem;
      font-weight: 600;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

    .deco-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 10px 0 20px;
    }

    .deco-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--neon);
      opacity: .25;
      box-shadow: 0 0 6px var(--neon);
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-brand">
      <div class="brand-text">
        <div class="brand-name">Benditos Granizados</div>
        <div class="brand-sub">🎵 Pide tu canción</div>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- VISTA PLAYLISTS -->
    <div id="viewPlaylists" class="view active">
      <div class="hero">
        <div class="hero-title-row">
          <img class="hero-logo" src="/img/logo-vaso.png" alt="Benditos Granizados"/>
          <div class="hero-title">¿Qué quieres<span>escuchar?</span></div>
          <img class="hero-logo" src="/img/logo-vaso.png" alt="Benditos Granizados"/>
        </div>
        <div class="hero-sub">Elige una playlist y pide tu canción favorita</div>
      </div>
      <div class="search-wrap" style="position:static;margin:6px 14px 4px">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="globalSearchInput" placeholder="Buscar canción o artista..." oninput="filterGlobalSearch()"/>
      </div>
      <div id="globalSearchResults"></div>
      <div class="deco-dots"><span></span><span></span><span></span></div>
      <p class="section-label">Playlists disponibles</p>
      <div class="playlists-list" id="playlistsGrid"></div>
    </div>

    <!-- VISTA CANCIONES -->
    <div id="viewSongs" class="view">
      <div class="songs-header">
        <button class="back-btn" onclick="goBack()">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Volver
        </button>
        <div class="songs-pl-name" id="songsTitle">Playlist</div>
      </div>
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Buscar canción..." oninput="filterSongs()"/>
      </div>
      <div class="songs-list" id="songsList"></div>
    </div>

  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <div class="modal-handle"></div>
      <img class="modal-thumb" id="confirmThumb" src="" alt="" style="display:none"/>
      <div class="modal-title" id="confirmTitle"></div>
      <div class="modal-sub">¿La agregamos a la cola? 🎶</div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-confirm" onclick="confirmRequest()">¡Sí, pónla! 🔥</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let allSongs = []
    let selectedSong = null
    let allPlaylistsCache = []
    let allSongsGlobal = null // se carga la primera vez que se busca

    function getClientId() {
      let id = localStorage.getItem('granizados_client_id')
      if (!id) { id = crypto.randomUUID(); localStorage.setItem('granizados_client_id', id) }
      return id
    }

    document.addEventListener('DOMContentLoaded', loadPlaylists)

    async function loadPlaylists() {
      try {
        const res = await fetch('/playlists')
        const playlists = await res.json()
        allPlaylistsCache = playlists
        const el = document.getElementById('playlistsGrid')
        const emojis = ['🎵','🔥','⚡','💜','🧊','🎶','💥','✨']
        if (!playlists.length) {
          el.innerHTML = '<p class="empty-msg">No hay playlists disponibles aún 😴</p>'
          return
        }
        el.innerHTML = playlists.map((pl, i) => `
          <div class="playlist-card" onclick="openPlaylist('${pl.id}', '${escAttr(pl.name)}')">
            <div class="pl-emoji">${emojis[i % emojis.length]}</div>
            <div class="pl-info">
              <div class="pl-name">${pl.name}</div>
              <div class="pl-meta">${pl.total} canciones disponibles</div>
            </div>
            <div class="pl-arrow">›</div>
          </div>
        `).join('')
      } catch (e) {
        document.getElementById('playlistsGrid').innerHTML = '<p class="empty-msg">Error cargando playlists 😵</p>'
      }
    }

    // ─── BÚSQUEDA GLOBAL (entre todas las canciones del sistema) ──────────────

    async function loadAllSongsGlobal() {
      if (allSongsGlobal) return allSongsGlobal
      const lists = allPlaylistsCache.length ? allPlaylistsCache : await (await fetch('/playlists')).json()
      const results = await Promise.all(
        lists.map(pl => fetch(`/playlists/${pl.id}/songs`).then(r => r.json()).catch(() => []))
      )
      const merged = []
      const seen = new Set()
      results.forEach(songs => {
        songs.forEach(s => {
          if (!seen.has(s.videoId)) { seen.add(s.videoId); merged.push(s) }
        })
      })
      allSongsGlobal = merged
      return merged
    }

    async function filterGlobalSearch() {
      const q = document.getElementById('globalSearchInput').value.toLowerCase().trim()
      const resultsEl = document.getElementById('globalSearchResults')
      const gridEl = document.getElementById('playlistsGrid')
      const labelEl = document.querySelector('.section-label')

      if (!q) {
        resultsEl.innerHTML = ''
        gridEl.style.display = ''
        if (labelEl) labelEl.style.display = ''
        return
      }

      gridEl.style.display = 'none'
      if (labelEl) labelEl.style.display = 'none'
      resultsEl.innerHTML = '<p class="loading-msg">Buscando...</p>'

      const songs = await loadAllSongsGlobal()
      const filtered = songs.filter(s => s.title.toLowerCase().includes(q))

      if (!filtered.length) {
        resultsEl.innerHTML = '<p class="empty-msg">No se encontraron canciones 🔍</p>'
        return
      }

      resultsEl.innerHTML = `
        <div class="songs-list" style="padding:0 14px 10px">
          ${filtered.map(s => `
            <div class="song-item" onclick="openConfirm('${s.videoId}', '${escAttr(s.title)}', '${s.thumbnail || ''}')">
              ${s.thumbnail
                ? `<img class="s-thumb" src="${s.thumbnail}" alt="${escAttr(s.title)}">`
                : '<div class="s-thumb s-thumb-ph">🎵</div>'
              }
              <div class="s-info"><div class="s-title">${s.title}</div></div>
              <div class="s-add">+</div>
            </div>
          `).join('')}
        </div>
      `
    }

    async function openPlaylist(id, name) {
      document.getElementById('songsTitle').textContent = name
      document.getElementById('searchInput').value = ''
      document.getElementById('songsList').innerHTML = '<p class="loading-msg">Cargando canciones...</p>'
      showView('viewSongs')
      try {
        const res = await fetch(`/playlists/${id}/songs`)
        allSongs = await res.json()
        renderSongs(allSongs)
      } catch (e) {
        document.getElementById('songsList').innerHTML = '<p class="empty-msg">Error cargando canciones 😵</p>'
      }
    }

    function renderSongs(songs) {
      const el = document.getElementById('songsList')
      if (!songs.length) { el.innerHTML = '<p class="empty-msg">No se encontraron canciones 🔍</p>'; return }
      el.innerHTML = songs.map(s => `
        <div class="song-item" onclick="openConfirm('${s.videoId}', '${escAttr(s.title)}', '${s.thumbnail || ''}')">
          ${s.thumbnail
            ? `<img class="s-thumb" src="${s.thumbnail}" alt="${escAttr(s.title)}">`
            : '<div class="s-thumb s-thumb-ph">🎵</div>'
          }
          <div class="s-info"><div class="s-title">${s.title}</div></div>
          <div class="s-add">+</div>
        </div>
      `).join('')
    }

    function filterSongs() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim()
      renderSongs(q ? allSongs.filter(s => s.title.toLowerCase().includes(q)) : allSongs)
    }

    function goBack() { showView('viewPlaylists'); allSongs = [] }
    function showView(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'))
      document.getElementById(id).classList.add('active')
    }

    function openConfirm(videoId, title, thumbnail) {
      selectedSong = { videoId, title, thumbnail }
      document.getElementById('confirmTitle').textContent = title
      const img = document.getElementById('confirmThumb')
      if (thumbnail) { img.src = thumbnail; img.style.display = 'block' }
      else img.style.display = 'none'
      document.getElementById('confirmModal').classList.add('open')
    }

    function closeModal() { document.getElementById('confirmModal').classList.remove('open'); selectedSong = null }
    document.addEventListener('click', e => { if (e.target === document.getElementById('confirmModal')) closeModal() })

    async function confirmRequest() {
      if (!selectedSong) return
      const btn = document.querySelector('.btn-confirm')
      btn.disabled = true; btn.textContent = 'Enviando...'
      try {
        const res = await fetch('/request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...selectedSong, clientId: getClientId() })
        })
        const data = await res.json()
        closeModal()
        showToast(data.ok ? '🔥 ¡Canción en camino!' : data.error, !data.ok)
      } catch (e) {
        showToast('Error de conexión 😵', true)
      } finally {
        btn.disabled = false; btn.textContent = '¡Sí, pónla! 🔥'
      }
    }

    function showToast(msg, isError = false) {
      const el = document.getElementById('toast')
      el.textContent = msg
      el.className = 'toast show' + (isError ? ' error' : '')
      setTimeout(() => el.classList.remove('show'), 3000)
    }

    function escAttr(str) { return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;') }
  </script>
</body>
</html>
